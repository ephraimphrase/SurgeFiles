{% extends 'base.html' %}

{% block title %}New Folder — SurgeFiles{% endblock title %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0"><i class="bi bi-folder-plus me-2"></i>New Folder</h5>
        </div>
        <div class="card-body">
          <form method="POST" action="{% url 'createFolder' %}" id="create-folder-form">
            {% csrf_token %}

            <div class="mb-3">
              <label for="folder-name" class="form-label">Folder Name <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="folder-name" name="name"
                     placeholder="e.g. Work Documents" required autofocus>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary" id="btn-create-folder">
                <i class="bi bi-folder-plus me-1"></i>Create
              </button>
              <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary" id="btn-cancel-folder">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
