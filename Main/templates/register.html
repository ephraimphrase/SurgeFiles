{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow">
            <div class="card-body p-4">
                <h4 class="card-title mb-4">Create an Account</h4>
                <form action="{% url 'register' %}" method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="regFirstName" class="form-label">First Name</label>
                        <input type="text" class="form-control" id="regFirstName" placeholder="First Name" name="first_name" autocomplete="given-name">
                    </div>
                    <div class="mb-3">
                        <label for="regLastName" class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="regLastName" placeholder="Last Name" name="last_name" autocomplete="family-name">
                    </div>
                    <div class="mb-3">
                        <label for="regEmail" class="form-label">Email</label>
                        <input type="email" class="form-control" id="regEmail" placeholder="Email" name="email" autocomplete="email">
                    </div>
                    <div class="mb-3">
                        <label for="regUsername" class="form-label">Username</label>
                        <input type="text" class="form-control" id="regUsername" placeholder="Username" name="username" autocomplete="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="regPassword" class="form-label">Password</label>
                        <input type="password" class="form-control" id="regPassword" placeholder="Password" name="password" autocomplete="new-password" required>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Sign Up</button>
                </form>
                <p class="text-center text-muted mt-3 mb-0">
                    Already have an account? <a href="{% url 'login' %}">Log In</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
