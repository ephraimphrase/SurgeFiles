{% extends 'base.html' %}
{% load static %}

{% block content %}
<main>
    <div class="container">
        <div class="row justify-content-start mt-4">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h4 class="card-title mb-4"><i class="bi bi-pencil-square me-2"></i>Edit File</h4>
                        <form action="{% url 'editFile' file.id %}" method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="editFileTitle" class="form-label">Title <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="editFileTitle" name="title" value="{{ file.title }}" required>
                            </div>
                            <div class="mb-3">
                                <label for="editFileDescription" class="form-label">Description</label>
                                <input type="text" class="form-control" id="editFileDescription" name="description" value="{{ file.description }}">
                            </div>
                            <div class="mb-4">
                                <label for="editFileFolder" class="form-label">Folder</label>
                                <select class="form-select" id="editFileFolder" name="folder">
                                    <option value="">No folder</option>
                                    {% for folder in folders %}
                                    <option value="{{ folder.id }}" {% if file.folder and file.folder.id == folder.id %}selected{% endif %}>{{ folder.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-primary" type="submit">Save</button>
                                <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
{% endblock content %}
