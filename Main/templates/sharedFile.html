<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>{{ file.title }} — SurgeFiles</title>
</head>
<body class="bg-light">
    <div class="container d-flex flex-column align-items-center justify-content-center min-vh-100 py-5">
        <div class="mb-4 text-center">
            <h2 class="fw-bold"><i class="bi bi-cloud-arrow-down me-2"></i>SurgeFiles</h2>
        </div>

        <div class="card shadow" style="max-width: 480px; width: 100%;">
            <div class="card-body p-4 text-center">
                <i class="bi bi-file-earmark-fill display-1 text-primary mb-3"></i>
                <h4 class="card-title mb-2" id="sharedFileTitle">{{ file.title }}</h4>

                {% if file.description %}
                <p class="card-text text-muted mb-3" id="sharedFileDescription">{{ file.description }}</p>
                {% endif %}

                <p class="text-muted small mb-4" id="sharedFileDate">
                    <i class="bi bi-calendar3 me-1"></i>Uploaded {{ file.date }}
                </p>

                <a href="{{ file.file.url }}" class="btn btn-primary btn-lg w-100" id="sharedFileDownloadBtn" download>
                    <i class="bi bi-download me-2"></i>Download
                </a>
            </div>
        </div>

        <footer class="mt-4 text-muted small" id="sharedFileFooter">
            Shared via <strong>SurgeFiles</strong>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
