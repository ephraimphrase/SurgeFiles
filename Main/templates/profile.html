{% extends 'base.html' %}
{% load static %}

{% block content %}
<main>
    <div class="container">
        <div class="row justify-content-start mt-4">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h4 class="card-title mb-4"><i class="bi bi-person-circle me-2"></i>Profile</h4>
                        <form action="{% url 'profile' %}" method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="profileFirstName" class="form-label">First Name</label>
                                <input type="text" class="form-control" id="profileFirstName" name="first_name" value="{{ request.user.first_name }}">
                            </div>
                            <div class="mb-3">
                                <label for="profileLastName" class="form-label">Last Name</label>
                                <input type="text" class="form-control" id="profileLastName" name="last_name" value="{{ request.user.last_name }}">
                            </div>
                            <div class="mb-3">
                                <label for="profileEmail" class="form-label">Email</label>
                                <input type="email" class="form-control" id="profileEmail" name="email" value="{{ request.user.email }}">
                            </div>
                            <div class="mb-4">
                                <label for="profileNewPassword" class="form-label">New Password</label>
                                <input type="password" class="form-control" id="profileNewPassword" name="new_password" autocomplete="new-password">
                                <div class="form-text" id="profilePasswordHelp">Leave blank to keep current password.</div>
                            </div>
                            <button class="btn btn-primary" type="submit" id="profileSaveBtn">Save</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
{% endblock content %}
